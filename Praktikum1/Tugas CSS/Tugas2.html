<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta 
        name="viewport" 
        content="width=device-width, initial-scale=1.0"
    >
    <title>Tugas Wireframe CSS & Bootstrap</title>
    
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >
    
    <style>
        body {
            background-color: #ffffff;
        }
        
        .wireframe-container {
            width: 600px;
            min-height: 825px;
            background-color: #ffffff;
        }

        .box-logo {
            width: 100px; 
            height: 100px;
        }

        .box-sidebar {
            width: 100px; 
            height: 375px;
        }

        .side-banner {
            width: 130px; 
            height: 140px;
        }

        .line-item {
            height: 25px;
            margin-bottom: -1px; 
        }

        .thick-line {
            height: 6px;
        }
        
        .bg-custom-gray {
            background-color: #808080 !important;
        }
        
        .border-custom {
            border: 1px solid #333 !important;
        }
    </style>
</head>

<body class="d-flex flex-column justify-content-center align-items-center min-vh-100 py-4">

    <!-- Nama dan NIM -->
    <div class="text-center mb-3">
        <h5 class="mb-1">Nama : Muhammad Djidzan Naufal Nugraha</h5>
        <h5>NIM : 2311102189</h5>
    </div>

    <div class="wireframe-container border-custom p-4 d-flex flex-column gap-3">
        
        <div class="d-flex gap-3" style="height: 100px;">
            <div class="box-logo border-custom d-flex justify-content-center align-items-center text-dark">
                Logo
            </div>
            <div class="flex-grow-1 bg-custom-gray border-custom"></div>
        </div>

        <div class="d-flex gap-3 flex-grow-1">
            
            <div class="box-sidebar border-custom d-flex justify-content-center align-items-center text-dark">
                Navigasi
            </div>

            <div class="flex-grow-1 d-flex flex-column">
                
                <div class="mb-4">
                    <div class="line-item border-custom w-100"></div>
                    <div class="line-item border-custom w-100"></div>
                    <div class="line-item border-custom w-100"></div>
                    <div class="line-item border-custom w-100"></div>
                </div>

                <div class="d-flex gap-3 mb-3">
                    
                    <div class="flex-grow-1">
                        <div class="line-item border-custom w-100"></div>
                        <div class="line-item border-custom w-100"></div>
                        <div class="line-item border-custom w-100"></div>
                        <div class="line-item border-custom w-100"></div>
                        <div class="line-item border-custom w-100"></div>
                        <div class="line-item border-custom w-100"></div>
                        <div class="line-item border-custom w-100"></div>
                        <div class="line-item border-custom w-100"></div>
                        <div class="line-item border-custom w-100"></div>
                        <div class="line-item border-custom w-100"></div>
                        <div class="line-item border-custom w-100"></div>
                        <div class="line-item border-custom w-100"></div>
                        <div class="line-item border-custom w-100"></div>
                        <div class="line-item border-custom w-100"></div>
                        <div class="line-item border-custom w-100"></div>
                        <div class="line-item border-custom w-100"></div>
                        <div class="line-item border-custom w-100"></div>
                    </div>

                    <div class="side-banner bg-custom-gray border-custom"></div>
                    
                </div>

                <div class="thick-line bg-dark w-100 mt-2"></div>
                
            </div>
        </div>

    </div>

</body>
</html>
